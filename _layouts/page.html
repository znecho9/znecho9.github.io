---
layout: default
---

{% if page.image %}
<div class="text-center mx-auto mb-5">
  <img class="featured-image text-center mx-auto rounded" src="{{ page.image | relative_url }}" alt="{{ page.title }}">
</div>
{% endif %}

<div class="col-lg-8 mx-auto">
  {% if page.title %}
  <div class="mainheading">
    <h1 class="posttitle">{{ page.title }}</h1>
  </div>
  {% endif %}

  <div class="article-post serif-font">
    {{ content }}
  </div>
</div>
